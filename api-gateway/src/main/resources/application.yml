spring:
  application:
    name: api-gateway
  config:
    import: "${CONFIG_SERVER_IMPORT:optional:configserver:http://localhost:8888}"
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"