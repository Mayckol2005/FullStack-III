spring.application.name=comunicacion-service
server.port=8081

# Conexión a la base de datos que acabas de crear
spring.datasource.url=jdbc:mysql://localhost:3306/colegio_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234

# Hibernate: Esto hará que las tablas se creen solas al darle Play
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect