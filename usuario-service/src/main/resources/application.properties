# Identidad
spring.application.name=usuario-service
server.port=8082

# Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_colegio_usuarios
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.lease-renewal-interval-in-seconds=30

# Resiliencia (Circuit Breaker)
resilience4j.circuitbreaker.instances.usuarioServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.usuarioServiceCB.slidingWindowSize=10

# Monitoreo
management.endpoints.web.exposure.include=health