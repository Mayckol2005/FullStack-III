server.port=8091
spring.application.name=academico-service

# Base de datos adaptada para IntelliJ y Docker
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/colegio_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka adaptado para IntelliJ y Docker
eureka.client.serviceUrl.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.prefer-ip-address=true