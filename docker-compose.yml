version: '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "3306:3306"
    networks:
      - microservices-net

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net

  academico-service:
    build: ./academico-service
    container_name: academico-service
    ports:
      - "8091:8091"
    depends_on:
      - mysql-db
      - eureka-server
    networks:
      - microservices-net
    restart: always

  usuario-service:
    build: ./usuario-service
    container_name: usuario-service
    ports:
      - "8092:8092"
    depends_on:
      - mysql-db
      - eureka-server
    networks:
      - microservices-net
    restart: always

  comunicacion-service:
    build: ./comunicacion-service
    container_name: comunicacion-service
    ports:
      - "8093:8093"
    depends_on:
      - mysql-db
      - eureka-server
    networks:
      - microservices-net
    restart: always

networks:
  microservices-net:
    driver: bridge